name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & a11y & e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_BASE: /PDFit/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: a11y check (axe-core, WCAG 2 AA)
        run: npm run test:a11y

      - name: e2e check (merge / split / rotate / watermark)
        run: npm run test:e2e

      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdfit-e2e
          path: |
            e2e-results.json
            e2e-artifacts/
          if-no-files-found: ignore
          retention-days: 7
